version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sqlvsnosql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-benchuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchpass}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_sql}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema/create_tables.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/data/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchuser -d ecommerce_sql"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: sqlvsnosql_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-benchuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-benchpass}
      MONGO_INITDB_DATABASE: ecommerce_nosql
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./nosql/schema/collections.js:/docker-entrypoint-initdb.d/01_collections.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
